<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geodinâmica – Visualizador 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1a15;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    background: linear-gradient(to bottom, rgba(13,26,21,0.95) 0%, transparent 100%);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
  }

  .brand-icon svg {
    width: 28px; height: 28px;
  }

  .brand-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    color: #fff;
  }

  .brand-text span { color: #67C187; }

  .topbar-info {
    text-align: right;
  }

  .model-name {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.1rem;
  }

  .model-meta {
    font-size: 0.72rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.45rem 1rem;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
  .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }
  #viewer-canvas {
    width: 100%;
    height: 100vh;
    display: block;
  }

  /* LOADING */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0d1a15;
    z-index: 20;
    gap: 1.5rem;
    transition: opacity 0.6s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-icon svg {
    width: 48px; height: 48px;
    animation: spin 2s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .loading-bar-wrap {
    width: 160px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .loading-bar {
    height: 100%;
    background: #005849;
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  /* CONTROLS HINT */
  .controls-hint {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.5rem;
    background: rgba(13,26,21,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    padding: 0.6rem 1.25rem;
    backdrop-filter: blur(8px);
    opacity: 1;
    transition: opacity 1s ease;
  }

  .controls-hint.fade {
    opacity: 0;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
  }

  .hint-key {
    font-size: 0.65rem;
    color: #67C187;
    border: 1px solid rgba(103,193,135,0.3);
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
  }

  /* BADGE */
  .geo-badge {
    position: absolute;
    bottom: 1.5rem;
    right: 1.5rem;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
  }

  /* ERROR */
  #error-msg {
    display: none;
    position: absolute;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: #0d1a15;
    z-index: 25;
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    font-weight: 300;
  }

  #error-msg.visible { display: flex; }

  #error-msg svg {
    width: 40px; height: 40px;
    stroke: rgba(255,255,255,0.2);
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="modelos.html" class="topbar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4,28 A14,14 0 0,1 28,28 Z" fill="#67C187" opacity="0.2"/>
        <polyline points="4,28 12,12 18,20 22,14 28,28" fill="none" stroke="#005849" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M4,26 Q10,24 16,26 Q22,28 28,26" fill="none" stroke="#005849" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="brand-text">GEO<span>DINÂMICA</span></span>
  </a>
  <div class="topbar-info">
    <div class="model-name" id="model-title">Modelo 3D</div>
    <div class="model-meta">Visualização interativa</div>
  </div>
  <a href="modelos.html" class="back-btn">
    <svg viewBox="0 0 16 16"><path d="M10 4l-4 4 4 4"/></svg>
    Portfólio
  </a>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loading-icon">
    <svg viewBox="0 0 48 48" fill="none" stroke="#005849" stroke-width="2" stroke-linecap="round">
      <circle cx="24" cy="24" r="20" stroke="rgba(0,88,73,0.2)"/>
      <path d="M24 4 A20 20 0 0 1 44 24"/>
    </svg>
  </div>
  <div class="loading-text">Carregando modelo</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
</div>

<!-- ERROR -->
<div id="error-msg">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  Não foi possível carregar o modelo.
  <span style="font-size:0.75rem;color:rgba(255,255,255,0.3)" id="error-detail"></span>
</div>

<!-- CANVAS -->
<canvas id="viewer-canvas"></canvas>

<!-- CONTROLS HINT -->
<div class="controls-hint" id="controls-hint">
  <div class="hint-item"><span class="hint-key">⟳</span> Arrastar para rotacionar</div>
  <div class="hint-item"><span class="hint-key">⊕</span> Scroll para zoom</div>
  <div class="hint-item"><span class="hint-key">⇥</span> Botão direito para mover</div>
</div>

<div class="geo-badge">geodinamicasa.com.br</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Pega o modelo da URL: ?modelo=URL_DO_GLB&nome=Nome+do+Projeto
const params = new URLSearchParams(window.location.search);
const modelUrl = params.get('modelo') || 'https://pub-2a76e30d86404683aa14800e5a945b61.r2.dev/modelo.glb';
const modelName = params.get('nome') || 'Modelo 3D';

document.getElementById('model-title').textContent = modelName;

// Fade hint after 5s
setTimeout(() => {
  document.getElementById('controls-hint').classList.add('fade');
}, 5000);

// THREE.JS SETUP
const canvas = document.getElementById('viewer-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = false; // desativa sombras para economizar memória GPU
renderer.physicallyCorrectLights = true;

// Aumenta limite de texturas para suportar 4096x4096
const gl = renderer.getContext();
const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
console.log('Max texture size:', maxTextureSize);

// Configura anisotropia máxima para texturas mais nítidas
const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();
renderer.capabilities.getMaxAnisotropy = () => maxAnisotropy;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1a15);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 2, 5);

// LIGHTS
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x67C187, 0.3);
fillLight.position.set(-5, 2, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
rimLight.position.set(0, -5, -5);
scene.add(rimLight);

// GRID
const gridHelper = new THREE.GridHelper(20, 20, 0x005849, 0x005849);
gridHelper.material.opacity = 0.08;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ORBIT CONTROLS (manual implementation)
let isDragging = false;
let isPanning = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.3, phi: 1.1, radius: 5 };
let target = new THREE.Vector3(0, 0, 0);
let panOffset = new THREE.Vector3();

function updateCamera() {
  const x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.radius * Math.cos(spherical.phi);
  const z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(
    target.x + x + panOffset.x,
    target.y + y + panOffset.y,
    target.z + z + panOffset.z
  );
  camera.lookAt(target.x + panOffset.x, target.y + panOffset.y, target.z + panOffset.z);
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) isPanning = true;
  else isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isDragging) {
    spherical.theta -= dx * 0.005;
    // Invertido: dy positivo (arrastar para baixo) = subir câmera
    // Travar em PI/2 para não ir abaixo do plano zero (phi max = PI/2 = visão horizontal)
    spherical.phi = Math.max(0.08, Math.min(Math.PI / 2, spherical.phi - dy * 0.005));
  }
  if (isPanning) {
    panOffset.x -= dx * 0.003;
    panOffset.y += dy * 0.003;
  }
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});

canvas.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; isPanning = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  spherical.radius = Math.max(0.5, Math.min(50, spherical.radius + e.deltaY * 0.01));
  updateCamera();
}, { passive: true });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.08, Math.min(Math.PI / 2, spherical.phi - dy * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    spherical.radius = Math.max(0.5, Math.min(50, spherical.radius - (dist - lastTouchDist) * 0.02));
    lastTouchDist = dist;
    updateCamera();
  }
}, { passive: true });

canvas.addEventListener('touchend', () => { isDragging = false; });

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// GLB LOADER
function loadGLB(url) {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    const bar = document.getElementById('loading-bar');

    loader.load(
      url,
      (gltf) => {
        // Success
        const model = gltf.scene;

        // Center and scale model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 3 / maxDim;

        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y -= (size.y * scale) / 2;

        // Enable shadows e anisotropia máxima nas texturas
        model.traverse(node => {
          if (node.isMesh) {
            node.castShadow = false;
            node.receiveShadow = false;
            // Aplica anisotropia máxima em todas as texturas para nitidez
            if (node.material) {
              const mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(mat => {
                ['map','normalMap','roughnessMap','metalnessMap','aoMap','emissiveMap'].forEach(key => {
                  if (mat[key]) {
                    mat[key].anisotropy = maxAnisotropy;
                    mat[key].needsUpdate = true;
                  }
                });
              });
            }
          }
        });

        scene.add(model);

        // Set camera distance based on model size — mais próximo para impacto
        spherical.radius = maxDim * scale * 1.4;
        spherical.phi = 1.0; // ângulo levemente acima
        updateCamera();

        // Move grid to model base
        gridHelper.position.y = -(size.y * scale) / 2;

        // Hide loading
        bar.style.width = '100%';
        setTimeout(() => {
          document.getElementById('loading').classList.add('hidden');
        }, 400);
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = (progress.loaded / progress.total) * 100;
          bar.style.width = pct + '%';
        }
      },
      (error) => {
        console.error(error);
        document.getElementById('loading').classList.add('hidden');
        const errEl = document.getElementById('error-msg');
        errEl.classList.add('visible');
        document.getElementById('error-detail').textContent = url;
      }
    );
  };
  document.head.appendChild(script);
}

loadGLB(modelUrl);
updateCamera();

// RENDER LOOP
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
