<script>
const params = new URLSearchParams(window.location.search);
const modelUrl = params.get('modelo') || 'https://pub-2a76e30d86404683aa14800e5a945b61.r2.dev/modelo.glb';
const modelName = params.get('nome') || 'Modelo 3D';
let modelLat = parseFloat(params.get('lat')) || null;
let modelLon = parseFloat(params.get('lon')) || null;

document.getElementById('model-title').textContent = modelName;
document.getElementById('solar-panel').classList.add('no-coords');

async function carregarCoordenadas() {
  if (modelLat && modelLon) { iniciarSolar(); return; }
  try {
    const resp = await fetch('modelos.json?v=' + Date.now());
    const modelos = await resp.json();
    const arquivo = modelUrl.split('/').pop();
    const modelo = modelos.find(m => m.arquivo === arquivo || m.url === modelUrl);
    if (modelo && modelo.lat && modelo.lon) {
      modelLat = modelo.lat;
      modelLon = modelo.lon;
      iniciarSolar();
    }
  } catch(e) { console.log('Coordenadas não encontradas'); }
}

carregarCoordenadas();

setTimeout(() => {
  document.getElementById('controls-hint').classList.add('fade');
}, 5000);

// ─── THREE.JS SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('viewer-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
// Sombras desativadas — usamos shader próprio para overlay de sombra
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2422);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 2, 5);

// Direção do sol — atualizada pelo controle solar
// vec3 em coordenadas Three.js (Y = cima)
const sunDir = new THREE.Vector3(0, 1, 0).normalize();

// ─── SHADER MATERIAL SOLAR ────────────────────────────────────────────────────
// Este shader mantém a textura fotográfica original e aplica sombreamento
// baseado no ângulo entre a normal da face e a direção do sol (dot product).
// O resultado é misturado com a textura: áreas de face para o sol ficam claras,
// áreas voltadas para longe do sol ficam escuras = sombras visíveis.

const solarShaderChunk = {
  uniforms: {
    sunDirection: { value: sunDir },
    sunIntensity: { value: 1.0 },
    ambientStrength: { value: 0.35 },
    sunriseColor: { value: new THREE.Color(1.0, 0.6, 0.2) },
    isNight: { value: 0.0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldNormal;
    void main() {
      vUv = uv;
      vNormal = normal;
      vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D map;
    uniform vec3 sunDirection;
    uniform float sunIntensity;
    uniform float ambientStrength;
    uniform vec3 sunriseColor;
    uniform float isNight;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldNormal;

    void main() {
      vec4 texColor = texture2D(map, vUv);

      // Dot product: 1.0 = face direto pro sol, 0.0 = tangente, negativo = sombra
      float diff = max(dot(vWorldNormal, normalize(sunDirection)), 0.0);

      // Suaviza a transição sombra/luz (evita banding)
      float shadow = smoothstep(0.0, 0.25, diff);

      // Luz ambiente + contribuição direcional
      float lighting = ambientStrength + (1.0 - ambientStrength) * shadow * sunIntensity;

      // Cor do sol (branco ao meio-dia, laranja ao nascer/por)
      vec3 lightColor = mix(vec3(1.0), sunriseColor, clamp((1.0 - sunIntensity) * 2.0, 0.0, 1.0));

      // Aplica iluminação sobre a textura
      vec3 finalColor = texColor.rgb * lighting * lightColor;

      // Noite: escurece tudo com tom azulado
      vec3 nightColor = texColor.rgb * 0.08 * vec3(0.6, 0.7, 1.0);
      finalColor = mix(finalColor, nightColor, isNight);

      gl_FragColor = vec4(finalColor, texColor.a);
    }
  `
};

// Mapa global para materiais solares (para atualizar uniforms depois)
const solarMaterials = [];

// ─── ORBIT CONTROLS ───────────────────────────────────────────────────────────
let isDragging = false;
let isPanning = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.3, phi: 1.1, radius: 5 };
let target = new THREE.Vector3(0, 0, 0);
let panOffset = new THREE.Vector3();

function updateCamera() {
  const x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  const y = spherical.radius * Math.cos(spherical.phi);
  const z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.set(
    target.x + x + panOffset.x,
    target.y + y + panOffset.y,
    target.z + z + panOffset.z
  );
  camera.lookAt(target.x + panOffset.x, target.y + panOffset.y, target.z + panOffset.z);
}

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) isPanning = true;
  else isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isDragging) {
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.08, Math.min(Math.PI / 2, spherical.phi - dy * 0.005));
  }
  if (isPanning) {
    panOffset.x -= dx * 0.003;
    panOffset.y += dy * 0.003;
  }
  prevMouse = { x: e.clientX, y: e.clientY };
  updateCamera();
});

canvas.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; isPanning = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  spherical.radius = Math.max(0.5, Math.min(50, spherical.radius + e.deltaY * 0.003));
  updateCamera();
}, { passive: true });

let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.08, Math.min(Math.PI / 2, spherical.phi - dy * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  }
  if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    spherical.radius = Math.max(0.5, Math.min(50, spherical.radius - (dist - lastTouchDist) * 0.02));
    lastTouchDist = dist;
    updateCamera();
  }
}, { passive: true });

canvas.addEventListener('touchend', () => { isDragging = false; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── GLB LOADER ───────────────────────────────────────────────────────────────
function loadGLB(url) {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const dracoScript = document.createElement('script');
    dracoScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js';
    dracoScript.onload = () => {
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
      const loader = new THREE.GLTFLoader();
      loader.setDRACOLoader(dracoLoader);
      const bar = document.getElementById('loading-bar');

      loader.load(
        url,
        (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 3 / maxDim;

          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));
          model.position.y -= (size.y * scale) / 2;

          const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

          // Substitui materiais pelo shader solar
          model.traverse(node => {
            if (node.isMesh && node.material) {
              const mats = Array.isArray(node.material) ? node.material : [node.material];
              const newMats = mats.map(mat => {
                // Pega a textura existente do material original
                const tex = mat.map;
                if (tex) {
                  tex.anisotropy = maxAnisotropy;
                  tex.needsUpdate = true;
                  tex.encoding = THREE.sRGBEncoding;
                }

                // Cria ShaderMaterial com a textura + uniforms solares
                const shaderMat = new THREE.ShaderMaterial({
                  uniforms: {
                    map: { value: tex },
                    sunDirection: { value: sunDir },
                    sunIntensity: { value: 1.0 },
                    ambientStrength: { value: 0.35 },
                    sunriseColor: { value: new THREE.Color(1.0, 0.65, 0.25) },
                    isNight: { value: 0.0 }
                  },
                  vertexShader: solarShaderChunk.vertexShader,
                  fragmentShader: solarShaderChunk.fragmentShader,
                  side: THREE.DoubleSide
                });

                solarMaterials.push(shaderMat);
                return shaderMat;
              });

              node.material = newMats.length === 1 ? newMats[0] : newMats;
            }
          });

          scene.add(model);

          spherical.radius = maxDim * scale * 1.4;
          spherical.phi = 1.0;
          updateCamera();

          bar.style.width = '100%';
          setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
          }, 400);
        },
        (progress) => {
          if (progress.total > 0) {
            bar.style.width = (progress.loaded / progress.total * 100) + '%';
          }
        },
        (error) => {
          console.error(error);
          document.getElementById('loading').classList.add('hidden');
          const errEl = document.getElementById('error-msg');
          errEl.classList.add('visible');
          document.getElementById('error-detail').textContent = url;
        }
      );
    };
    document.head.appendChild(dracoScript);
  };
  document.head.appendChild(script);
}

loadGLB(modelUrl);
updateCamera();

// ─── CONTROLE SOLAR ───────────────────────────────────────────────────────────
function iniciarSolar() {
  document.getElementById('solar-panel').classList.remove('no-coords');
  const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  function dayOfYearToDate(doy) {
    const d = new Date(new Date().getFullYear(), 0);
    d.setDate(doy);
    return d;
  }

  function formatHora(minutes) {
    const h = Math.floor(minutes / 60).toString().padStart(2,'0');
    const m = (minutes % 60).toString().padStart(2,'0');
    return `${h}:${m}`;
  }

  function formatData(doy) {
    const d = dayOfYearToDate(doy);
    return `${MESES[d.getMonth()]} ${d.getDate()}`;
  }

  function updateSun(minutes, doy) {
    const date = dayOfYearToDate(doy);
    date.setHours(Math.floor(minutes/60), minutes%60, 0);

    const pos = SunCalc.getPosition(date, modelLat, modelLon);
    const elevDeg = pos.altitude * (180/Math.PI);
    // SunCalc azimuth: 0 = Sul, Pi = Norte, sentido horário
    const azDeg = ((pos.azimuth * (180/Math.PI)) + 180) % 360;

    document.getElementById('hora-label').textContent = formatHora(minutes);
    document.getElementById('data-label').textContent = formatData(doy);
    document.getElementById('solar-time-display').textContent = formatHora(minutes);
    document.getElementById('sun-elevation').textContent = elevDeg.toFixed(1) + '°';
    document.getElementById('sun-azimuth').textContent = azDeg.toFixed(1) + '°';

    if (elevDeg < 0) {
      document.getElementById('sun-status').textContent = 'Noite';
      document.getElementById('sun-status').style.color = 'rgba(255,255,255,0.3)';
    } else if (elevDeg < 10) {
      document.getElementById('sun-status').textContent = 'Amanhecer';
      document.getElementById('sun-status').style.color = '#EF9F27';
    } else {
      document.getElementById('sun-status').textContent = 'Dia';
      document.getElementById('sun-status').style.color = '#67C187';
    }

    if (elevDeg > 0) {
      const elevRad = pos.altitude;
      // Converte azimute para vetor 3D no espaço Three.js
      // SunCalc: 0 = Sul. Three.js: Z+ = frente (Sul), X+ = Leste, Y = cima
      const azRad = pos.azimuth; // já em radianos, referência Sul
      sunDir.set(
        -Math.cos(elevRad) * Math.sin(azRad),  // X = Leste/Oeste
         Math.sin(elevRad),                     // Y = altura
        -Math.cos(elevRad) * Math.cos(azRad)   // Z = Norte/Sul
      ).normalize();

      // Intensidade: cresce com a elevação, pico ao meio-dia
      const intensity = Math.pow(Math.sin(elevRad), 0.6); // curva suave

      // Cor: laranja no horizonte, branco ao meio-dia
      const isRiseSet = elevDeg < 20 ? (20 - elevDeg) / 20 : 0;

      // Atualiza todos os materiais solares
      solarMaterials.forEach(mat => {
        mat.uniforms.sunDirection.value.copy(sunDir);
        mat.uniforms.sunIntensity.value = intensity;
        mat.uniforms.ambientStrength.value = 0.25 + intensity * 0.15; // 0.25 noite → 0.40 meio-dia
        mat.uniforms.sunriseColor.value.setRGB(1.0, 0.55 + intensity * 0.45, 0.2 + intensity * 0.8);
        mat.uniforms.isNight.value = 0.0;
      });

    } else {
      // Noite
      sunDir.set(0, -1, 0);
      solarMaterials.forEach(mat => {
        mat.uniforms.sunDirection.value.copy(sunDir);
        mat.uniforms.sunIntensity.value = 0.0;
        mat.uniforms.isNight.value = 1.0;
      });
    }
  }

  const now = new Date();
  const minutesNow = now.getHours() * 60 + now.getMinutes();
  const doyNow = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);

  document.getElementById('hora-slider').value = minutesNow;
  document.getElementById('data-slider').value = doyNow;
  updateSun(minutesNow, doyNow);

  document.getElementById('hora-slider').addEventListener('input', function() {
    updateSun(parseInt(this.value), parseInt(document.getElementById('data-slider').value));
  });

  document.getElementById('data-slider').addEventListener('input', function() {
    updateSun(parseInt(document.getElementById('hora-slider').value), parseInt(this.value));
  });

  document.getElementById('btn-agora').addEventListener('click', function() {
    const n = new Date();
    const m = n.getHours() * 60 + n.getMinutes();
    const d = Math.floor((n - new Date(n.getFullYear(), 0, 0)) / 86400000);
    document.getElementById('hora-slider').value = m;
    document.getElementById('data-slider').value = d;
    updateSun(m, d);
  });
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
