<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geodinâmica – Gaussian Splatting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1e2422; color: #fff; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    background: linear-gradient(to bottom, rgba(13,26,21,0.95) 0%, transparent 100%);
  }
  .topbar-brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
  .brand-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.04em; color: #fff; }
  .brand-text span { color: #67C187; }
  .topbar-info { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
  .model-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 0.1rem; }
  .model-meta { font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── GIZMO ── */
  #axis-gizmo {
    position: absolute; bottom: 4.5rem; left: 1.5rem; z-index: 6;
    width: 86px; height: 86px; border-radius: 50%;
    cursor: grab; touch-action: none;
  }
  #axis-gizmo:active { cursor: grabbing; }
  .back-btn {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1); padding: 0.45rem 1rem; border-radius: 2px; transition: all 0.2s;
  }
  .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
  .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1e2422; z-index: 20; gap: 1.5rem; transition: opacity 0.6s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-icon svg { width: 48px; height: 48px; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .loading-sub { font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.25); letter-spacing: 0.06em; }
  .loading-bar-wrap { width: 160px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .loading-bar { height: 100%; background: #005849; width: 0%; transition: width 0.2s ease; border-radius: 2px; }

  .controls-hint {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: 1.5rem;
    background: rgba(13,26,21,0.7); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px; padding: 0.6rem 1.25rem; backdrop-filter: blur(8px);
    opacity: 1; transition: opacity 1s ease; z-index: 5;
  }
  .controls-hint.fade { opacity: 0; }
  .hint-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.4); }
  .hint-key { font-size: 0.65rem; color: #67C187; border: 1px solid rgba(103,193,135,0.3); padding: 0.1rem 0.4rem; border-radius: 2px; }

  @media (max-width: 768px) {
    .topbar { padding: 0.6rem 1rem; }
    .topbar-info { display: none; }
    .brand-text { font-size: 0.78rem; letter-spacing: 0.02em; }
    .back-btn { font-size: 0.68rem; padding: 0.35rem 0.65rem; letter-spacing: 0.03em; }
    #axis-gizmo { width: 60px; height: 60px; bottom: 3.5rem; left: 1rem; }
    .geo-badge { display: none; }
    .controls-hint { gap: 0.75rem; padding: 0.5rem 1rem; white-space: nowrap; }
    .hint-item { font-size: 0.65rem; }
  }

  /* Canvas criado pelo viewer precisa preencher o viewport como fundo */
  canvas:not(#axis-gizmo) {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100vw !important; height: 100vh !important;
    z-index: 0 !important;
    display: block !important;
  }

  .geo-badge {
    position: absolute; bottom: 1.5rem; right: 1.5rem; z-index: 5;
    font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.08);
    padding: 0.25rem 0.6rem; border-radius: 2px;
  }

  .splat-badge {
    position: absolute; bottom: 1.5rem; left: 1.5rem; z-index: 5;
    font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: #67C187; border: 1px solid rgba(103,193,135,0.2);
    background: rgba(0,40,30,0.6);
    padding: 0.25rem 0.6rem; border-radius: 2px;
  }

  #error-msg {
    display: none; position: absolute; inset: 0;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; background: #1e2422; z-index: 25;
    color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 300;
  }
  #error-msg.visible { display: flex; }
  #error-msg svg { width: 40px; height: 40px; stroke: rgba(255,255,255,0.2); fill: none; stroke-width: 1.5; stroke-linecap: round; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
  <a href="splats.html" class="topbar-brand">
    <span class="brand-text">GEO<span>DINÂMICA</span></span>
  </a>
  <div class="topbar-info">
    <div class="model-name" id="model-title">Gaussian Splatting</div>
    <div class="model-meta">Visualização imersiva</div>
  </div>
  <a href="splats.html" class="back-btn">
    <svg viewBox="0 0 16 16"><path d="M10 4l-4 4 4 4"/></svg>
    Portfólio
  </a>
</div>

<div id="loading">
  <div class="loading-icon">
    <svg viewBox="0 0 48 48" fill="none" stroke="#005849" stroke-width="2" stroke-linecap="round">
      <circle cx="24" cy="24" r="20" stroke="rgba(0,88,73,0.2)"/>
      <path d="M24 4 A20 20 0 0 1 44 24"/>
    </svg>
  </div>
  <div class="loading-text">Carregando splat</div>
  <div class="loading-sub" id="loading-stage">Baixando modelo...</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
</div>

<div id="error-msg">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Não foi possível carregar o modelo.
  <span style="font-size:0.75rem;color:rgba(255,255,255,0.3)" id="error-detail"></span>
</div>

<div class="controls-hint" id="controls-hint">
  <div class="hint-item"><span class="hint-key">⟳</span> Arrastar para rotacionar</div>
  <div class="hint-item"><span class="hint-key">⊕</span> Scroll para zoom</div>
  <div class="hint-item"><span class="hint-key">⇥</span> Botão direito para mover</div>
</div>

<canvas id="axis-gizmo" width="86" height="86"></canvas>
<div class="splat-badge">Gaussian Splatting</div>
<div class="geo-badge">geodinamicasa.com.br</div>

<script>
// ─── GIZMO ────────────────────────────────────────────────────────────────────
function initGizmo(getCameraFn) {
  const g = document.getElementById('axis-gizmo');
  const ctx = g.getContext('2d');
  const W = g.width, H = g.height, cx = W/2, cy = H/2, LEN = 28;

  let ox = 0, oy = 0, dragging = false;
  g.addEventListener('pointerdown', e => {
    dragging = true;
    ox = e.clientX - g.offsetLeft;
    oy = e.clientY - g.offsetTop;
    g.setPointerCapture(e.pointerId);
    e.stopPropagation();
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    g.style.left = (e.clientX - ox) + 'px';
    g.style.top  = (e.clientY - oy) + 'px';
    g.style.bottom = 'auto'; g.style.right = 'auto';
  });
  window.addEventListener('pointerup', () => { dragging = false; });

  function draw() {
    const camera = getCameraFn();
    if (!camera || !camera.matrixWorldInverse) { requestAnimationFrame(draw); return; }

    const e = camera.matrixWorldInverse.elements;
    const axes = [
      { sx: e[0], sy: e[1], sz: e[2],  color: '#ff4444', label: 'X' },
      { sx: e[4], sy: e[5], sz: e[6],  color: '#44dd55', label: 'Y' },
      { sx: e[8], sy: e[9], sz: e[10], color: '#4488ff', label: 'Z' },
    ];
    axes.sort((a, b) => a.sz - b.sz);

    ctx.clearRect(0, 0, W, H);
    ctx.beginPath();
    ctx.arc(cx, cy, cx - 1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(13,26,21,0.65)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1; ctx.stroke();

    axes.forEach(ax => {
      const behind = ax.sz > 0;
      ctx.globalAlpha = behind ? 0.3 : 0.92;
      const ex = cx + ax.sx * LEN;
      const ey = cy - ax.sy * LEN;
      ctx.strokeStyle = ax.color;
      ctx.lineWidth   = behind ? 1.2 : 2;
      if (behind) ctx.setLineDash([3, 3]); else ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(ex, ey, behind ? 2 : 3, 0, Math.PI * 2);
      ctx.fillStyle = ax.color; ctx.fill();
      ctx.font = 'bold 9px sans-serif'; ctx.fillStyle = ax.color;
      ctx.fillText(ax.label, ex + (ax.sx >= 0 ? 4 : -11), ey + (ax.sy <= 0 ? -3 : 10));
      ctx.globalAlpha = 1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
<script type="module">
const params    = new URLSearchParams(window.location.search);
const splatUrl  = params.get('splat') || '';
const splatNome = params.get('nome')  || 'Gaussian Splatting';

document.getElementById('model-title').textContent = splatNome;
// Dica adaptada para toque ou mouse
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('controls-hint').innerHTML = `
    <div class="hint-item"><span class="hint-key">1 dedo</span> Rotacionar</div>
    <div class="hint-item"><span class="hint-key">2 dedos</span> Zoom</div>
  `;
}
setTimeout(() => document.getElementById('controls-hint').classList.add('fade'), 5000);

// Botão voltar: vai para admin se vier de lá
const isAdmin = params.get('admin') === '1';
const fromAdmin = params.get('from') === 'admin' || isAdmin;
if (fromAdmin) {
  const btn = document.querySelector('.back-btn');
  if (btn) { btn.href = 'admin.html'; btn.lastChild.textContent = ' Admin'; }
}

if (!splatUrl) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = 'URL do modelo não informada.';
  throw new Error('URL ausente');
}

// ─── IMPORTA BIBLIOTECA ────────────────────────────────────────────────────────
// gaussian-splats-3d gerencia seu próprio renderer WebGL e canvas
let GaussianSplats3D;
try {
  GaussianSplats3D = await import('https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7');
} catch(e) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = 'Falha ao carregar a biblioteca de renderização.';
  console.error(e);
  throw e;
}

// ─── VIEWER ───────────────────────────────────────────────────────────────────
const bar   = document.getElementById('loading-bar');
const stage = document.getElementById('loading-stage');

// Detecta formato pelo sufixo da URL; usa SceneFormat se disponível
const ext = splatUrl.split('?')[0].split('.').pop().toLowerCase();
const SF  = GaussianSplats3D.SceneFormat || {};
const fmtMap = { ply: SF.Ply ?? 1, ksplat: SF.KSplat ?? 2 };
const sceneFormat = fmtMap[ext] ?? (SF.Splat ?? 0);

// Carrega vista salva (se existir) antes de criar o viewer
let vistaSalva = null;
try {
  const splatList = await fetch('splats.json?v=' + Date.now()).then(r => r.json());
  const entry = splatList.find(s => s.url === splatUrl || s.url === decodeURIComponent(splatUrl));
  if (entry?.vista) vistaSalva = entry.vista;
} catch(e) { /* sem vista */ }

// Monta opções do Viewer defensivamente (enums podem variar por versão)
const viewerOpts = {
  sharedMemoryForWorkers: false,
  gpuAcceleratedSort: false,
  selfDrivenMode: true,
  antialiased: true,
  preserveDrawingBuffer: isAdmin,          // necessário para captura de thumbnail
  initialCameraPosition: vistaSalva?.position ?? [0, -1, 0.5],
  initialCameraLookAt:   vistaSalva?.target   ?? [0,  0,  0],
};
if (GaussianSplats3D.SceneRevealMode?.Gradual !== undefined)
  viewerOpts.sceneRevealMode = GaussianSplats3D.SceneRevealMode.Gradual;

const viewer = new GaussianSplats3D.Viewer(viewerOpts);

// ─── CARREGA O ARQUIVO ────────────────────────────────────────────────────────
viewer.addSplatScene(splatUrl, {
  showLoadingUI: false,
  format: sceneFormat,
  splatAlphaRemovalThreshold: 5,
  onProgress: (progress) => {
    const pct = Math.min(Math.round(progress), 95);
    bar.style.width = pct + '%';
    stage.textContent = pct < 60 ? 'Baixando modelo...' : 'Processando splats...';
  }
})
.then(() => {
  bar.style.width = '100%';
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
  viewer.start();

  // Notifica admin que o splat carregou (quando em iframe)
  if (isAdmin) window.parent.postMessage({ type: 'splat-ready' }, '*');

  // Modo admin: responde a pedidos de captura
  if (isAdmin) {
    window.addEventListener('message', (ev) => {
      if (ev.data?.type !== 'capture-splat') return;
      const sCanvas = document.querySelector('canvas:not(#axis-gizmo)');
      let thumbnail = null;
      try { thumbnail = sCanvas?.toDataURL('image/jpeg', 0.88) ?? null; } catch(e) {}
      const cam  = viewer.camera;
      const ctrl = viewer.controls || viewer.orbitControls;
      window.parent.postMessage({
        type: 'splat-captured',
        thumbnail,
        camera: cam ? {
          position: [cam.position.x, cam.position.y, cam.position.z],
          target:   ctrl?.target ? [ctrl.target.x, ctrl.target.y, ctrl.target.z] : [0, 0, 0]
        } : null
      }, '*');
    });
  }

  // Gizmo de eixos
  initGizmo(() => viewer.camera);

  // Configura OrbitControls para orbita livre e limita zoom-out
  const configureControls = () => {
    const ctrl   = viewer.controls || viewer.orbitControls || viewer.camera?.controls;
    const camera = viewer.camera;
    if (!ctrl || !camera) { setTimeout(configureControls, 100); return; }

    // Desativa OrbitControls — controle 100% manual
    ctrl.enabled = false;

    const canvas = viewer.renderer?.domElement
                || document.querySelector('canvas:not(#axis-gizmo)');
    const T = ctrl.target; // alvo do orbit (referência direta)

    // ── Estado esférico turntable Z-up ────────────────────────────────────
    // Coord esféricas: x = r·sinφ·cosθ, y = r·sinφ·sinθ, z = r·cosφ
    // φ=0 → câmera acima (+Z); φ=π/2 → câmera no plano XY; φ=π → abaixo
    const cx0 = camera.position.x - T.x;
    const cy0 = camera.position.y - T.y;
    const cz0 = camera.position.z - T.z;
    let radius = Math.max(0.1, Math.min(6, Math.sqrt(cx0*cx0 + cy0*cy0 + cz0*cz0) || 2));
    let theta  = Math.atan2(cy0, cx0);
    let phi    = Math.acos(Math.max(-1, Math.min(1, cz0 / radius)));

    function applyCamera() {
      const sP = Math.sin(phi), cP = Math.cos(phi);
      const cT = Math.cos(theta), sT = Math.sin(theta);
      camera.position.set(
        T.x + radius * sP * cT,
        T.y + radius * sP * sT,
        T.z + radius * cP
      );
      camera.up.set(0, 0, 1); // Z é o eixo vertical do modelo
      camera.lookAt(T);
    }
    applyCamera();

    // ── Eventos de ponteiro (mouse + touch) ──────────────────────────────
    let drag = null;
    const activePointers = new Map(); // pointerId → {x, y}
    let lastPinchDist = null;

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      canvas.setPointerCapture(e.pointerId);

      if (activePointers.size === 1 && drag === null) {
        drag = { button: e.button, lastX: e.clientX, lastY: e.clientY };
      }
      if (activePointers.size === 2) {
        drag = null; // cancela orbit ao iniciar pinça
        const pts = [...activePointers.values()];
        lastPinchDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!activePointers.has(e.pointerId)) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      // PINCH-TO-ZOOM (2 dedos)
      if (activePointers.size === 2) {
        const pts = [...activePointers.values()];
        const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
        if (lastPinchDist !== null) {
          radius = Math.max(0.1, Math.min(3, radius - (dist - lastPinchDist) * 0.008));
          applyCamera();
        }
        lastPinchDist = dist;
        return;
      }

      if (!drag) return;
      const dx = e.clientX - drag.lastX;
      const dy = e.clientY - drag.lastY;
      drag.lastX = e.clientX;
      drag.lastY = e.clientY;

      if (drag.button === 0 || drag.button === 1) {
        // ORBIT turntable Z-up
        theta -= dx * 0.005;
        phi = Math.max(0.05, Math.min(Math.PI / 2, phi - dy * 0.005));
        applyCamera();

      } else if (drag.button === 2) {
        // PAN Z-up
        const s = radius * 0.001;
        const sinT = Math.sin(theta), cosT = Math.cos(theta);
        const sinP = Math.sin(phi),   cosP = Math.cos(phi);
        const dpx = ( sinT * dx - cosP * cosT * dy) * s;
        const dpy = (-cosT * dx - cosP * sinT * dy) * s;
        const dpz = ( sinP * dy) * s;
        T.x += dpx; T.y += dpy; T.z += dpz;
        camera.position.x += dpx;
        camera.position.y += dpy;
        camera.position.z += dpz;
      }
    });

    canvas.addEventListener('pointerup', (e) => {
      activePointers.delete(e.pointerId);
      if (drag?.button === e.button) drag = null;
      if (activePointers.size < 2) lastPinchDist = null;
    });
    canvas.addEventListener('pointerout', (e) => {
      activePointers.delete(e.pointerId);
      if (activePointers.size === 0) drag = null;
      if (activePointers.size < 2) lastPinchDist = null;
    });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // ZOOM — scroll (desktop)
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      radius = Math.max(0.1, Math.min(3, radius + e.deltaY * 0.003));
      applyCamera();
    }, { passive: false });
  };
  configureControls();
})
.catch(err => {
  console.error(err);
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = splatUrl;
});
</script>

</body>
</html>
