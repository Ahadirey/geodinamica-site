<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geodinâmica – Gaussian Splatting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1e2422; color: #fff; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    background: linear-gradient(to bottom, rgba(13,26,21,0.95) 0%, transparent 100%);
  }
  .topbar-brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
  .brand-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.04em; color: #fff; }
  .brand-text span { color: #67C187; }
  .topbar-info { text-align: right; }
  .model-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 0.1rem; }
  .model-meta { font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }
  .back-btn {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); text-decoration: none;
    border: 1px solid rgba(255,255,255,0.1); padding: 0.45rem 1rem; border-radius: 2px; transition: all 0.2s;
  }
  .back-btn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
  .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #1e2422; z-index: 20; gap: 1.5rem; transition: opacity 0.6s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-icon svg { width: 48px; height: 48px; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .loading-sub { font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.25); letter-spacing: 0.06em; }
  .loading-bar-wrap { width: 160px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .loading-bar { height: 100%; background: #005849; width: 0%; transition: width 0.2s ease; border-radius: 2px; }

  .controls-hint {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    display: flex; gap: 1.5rem;
    background: rgba(13,26,21,0.7); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px; padding: 0.6rem 1.25rem; backdrop-filter: blur(8px);
    opacity: 1; transition: opacity 1s ease; z-index: 5;
  }
  .controls-hint.fade { opacity: 0; }
  .hint-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; font-weight: 300; color: rgba(255,255,255,0.4); }
  .hint-key { font-size: 0.65rem; color: #67C187; border: 1px solid rgba(103,193,135,0.3); padding: 0.1rem 0.4rem; border-radius: 2px; }

  .geo-badge {
    position: absolute; bottom: 1.5rem; right: 1.5rem; z-index: 5;
    font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.08);
    padding: 0.25rem 0.6rem; border-radius: 2px;
  }

  .splat-badge {
    position: absolute; bottom: 1.5rem; left: 1.5rem; z-index: 5;
    font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: #67C187; border: 1px solid rgba(103,193,135,0.2);
    background: rgba(0,40,30,0.6);
    padding: 0.25rem 0.6rem; border-radius: 2px;
  }

  #error-msg {
    display: none; position: absolute; inset: 0;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 1rem; background: #1e2422; z-index: 25;
    color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 300;
  }
  #error-msg.visible { display: flex; }
  #error-msg svg { width: 40px; height: 40px; stroke: rgba(255,255,255,0.2); fill: none; stroke-width: 1.5; stroke-linecap: round; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<div class="topbar">
  <a href="splats.html" class="topbar-brand">
    <span class="brand-text">GEO<span>DINÂMICA</span></span>
  </a>
  <div class="topbar-info">
    <div class="model-name" id="model-title">Gaussian Splatting</div>
    <div class="model-meta">Visualização imersiva</div>
  </div>
  <a href="splats.html" class="back-btn">
    <svg viewBox="0 0 16 16"><path d="M10 4l-4 4 4 4"/></svg>
    Portfólio
  </a>
</div>

<div id="loading">
  <div class="loading-icon">
    <svg viewBox="0 0 48 48" fill="none" stroke="#005849" stroke-width="2" stroke-linecap="round">
      <circle cx="24" cy="24" r="20" stroke="rgba(0,88,73,0.2)"/>
      <path d="M24 4 A20 20 0 0 1 44 24"/>
    </svg>
  </div>
  <div class="loading-text">Carregando splat</div>
  <div class="loading-sub" id="loading-stage">Baixando modelo...</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
</div>

<div id="error-msg">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Não foi possível carregar o modelo.
  <span style="font-size:0.75rem;color:rgba(255,255,255,0.3)" id="error-detail"></span>
</div>

<div class="controls-hint" id="controls-hint">
  <div class="hint-item"><span class="hint-key">⟳</span> Arrastar para rotacionar</div>
  <div class="hint-item"><span class="hint-key">⊕</span> Scroll para zoom</div>
  <div class="hint-item"><span class="hint-key">⇥</span> Botão direito para mover</div>
</div>

<div class="splat-badge">Gaussian Splatting</div>
<div class="geo-badge">geodinamicasa.com.br</div>

<script type="module">
const params    = new URLSearchParams(window.location.search);
const splatUrl  = params.get('splat') || '';
const splatNome = params.get('nome')  || 'Gaussian Splatting';

document.getElementById('model-title').textContent = splatNome;
setTimeout(() => document.getElementById('controls-hint').classList.add('fade'), 5000);

if (!splatUrl) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = 'URL do modelo não informada.';
  throw new Error('URL ausente');
}

// ─── IMPORTA BIBLIOTECA ────────────────────────────────────────────────────────
// gaussian-splats-3d gerencia seu próprio renderer WebGL e canvas
let GaussianSplats3D;
try {
  GaussianSplats3D = await import('https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.7');
} catch(e) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = 'Falha ao carregar a biblioteca de renderização.';
  console.error(e);
  throw e;
}

// ─── VIEWER ───────────────────────────────────────────────────────────────────
const bar   = document.getElementById('loading-bar');
const stage = document.getElementById('loading-stage');

// Detecta formato pelo sufixo da URL; usa SceneFormat se disponível
const ext = splatUrl.split('?')[0].split('.').pop().toLowerCase();
const SF  = GaussianSplats3D.SceneFormat || {};
const fmtMap = { ply: SF.Ply ?? 1, ksplat: SF.KSplat ?? 2 };
const sceneFormat = fmtMap[ext] ?? (SF.Splat ?? 0);

// Monta opções do Viewer defensivamente (enums podem variar por versão)
const viewerOpts = {
  sharedMemoryForWorkers: false,
  gpuAcceleratedSort: false,
  selfDrivenMode: true,
  antialiased: true,
  cameraUp: [0, 0, 1],
  initialCameraPosition: [-20, -40, 20],
  initialCameraLookAt:   [1.6, -4.5, -2],
};
if (GaussianSplats3D.SceneRevealMode?.Gradual !== undefined)
  viewerOpts.sceneRevealMode = GaussianSplats3D.SceneRevealMode.Gradual;

const viewer = new GaussianSplats3D.Viewer(viewerOpts);

// ─── CARREGA O ARQUIVO ────────────────────────────────────────────────────────
viewer.addSplatScene(splatUrl, {
  showLoadingUI: false,
  format: sceneFormat,
  splatAlphaRemovalThreshold: 5,
  onProgress: (progress) => {
    const pct = Math.min(Math.round(progress), 95);
    bar.style.width = pct + '%';
    stage.textContent = pct < 60 ? 'Baixando modelo...' : 'Processando splats...';
  }
})
.then(() => {
  bar.style.width = '100%';
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
  viewer.start();
})
.catch(err => {
  console.error(err);
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').classList.add('visible');
  document.getElementById('error-detail').textContent = splatUrl;
});
</script>

</body>
</html>
